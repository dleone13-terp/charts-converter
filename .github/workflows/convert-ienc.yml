name: Convert European IENC to MBTiles

on:
  workflow_dispatch:
    inputs:
      force_countries:
        description: >
          Comma-separated country codes to force-convert (e.g. DE,HR),
          or "all" to reconvert every country regardless of timestamp.
        required: false
        default: ''

jobs:

  # ── Job 1: Detect which countries changed since last run ──────────────
  check-updates:
    name: Check IENC source changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      countries_to_run: ${{ steps.check.outputs.countries_to_run }}
      has_updates: ${{ steps.check.outputs.has_updates }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for IENC updates
        id: check
        env:
          FORCE_ALL: ${{ github.event.inputs.force_countries == 'all' && 'true' || 'false' }}
          FORCE_COUNTRIES: ${{ github.event.inputs.force_countries != 'all' && github.event.inputs.force_countries || '' }}
        run: bash scripts/check-ienc-updates.sh

      - name: Report
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" = "true" ]; then
            echo "Countries to convert: ${{ steps.check.outputs.countries_to_run }}"
          else
            echo "All countries are up-to-date — nothing to convert."
          fi

  # ── Job 2: Convert each changed country (parallel matrix) ─────────────
  convert:
    name: Convert ${{ matrix.country }}
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        country: ${{ fromJson(needs.check-updates.outputs.countries_to_run) }}

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ${{ matrix.country }} IENC sources
        run: |
          mkdir -p /tmp/ienc-enc /tmp/enc-output
          COUNTRY="${{ matrix.country }}"

          case "$COUNTRY" in

            AT)
              URL="https://www.doris.bmimi.gv.at/fileadmin/content/doris/ECDIS_Download/2W_Edition.zip"
              LM=$(curl -fsI --max-time 20 --retry 3 "$URL" \
                | grep -i '^last-modified:' | tr -d '\r' | sed 's/^[Ll]ast-[Mm]odified: //' || true)
              echo "LAST_MODIFIED=${LM}" >> "$GITHUB_ENV"
              curl -fL --retry 3 "$URL" -o /tmp/ienc-part.zip
              unzip -qo /tmp/ienc-part.zip -d /tmp/ienc-enc && rm /tmp/ienc-part.zip
              ;;

            HR)
              for url in \
                "http://www.vodniputovi.hr/enc/dunav/dunav.zip" \
                "http://www.vodniputovi.hr/enc/sava/sava.zip" \
                "http://www.vodniputovi.hr/enc/drava/drava.zip"; do
                curl -fL --retry 3 "$url" -o /tmp/ienc-part.zip
                unzip -qo /tmp/ienc-part.zip -d /tmp/ienc-enc && rm /tmp/ienc-part.zip
              done
              ;;

            RS)
              URLS=$(curl -fsL --max-time 30 "http://www.plovput.rs/electronic-navigational-charts" \
                | grep -oE 'href="[^"]*IENC[^"]*\.zip"' | grep -oE '"[^"]*"' | tr -d '"' | sort -u || true)
              FP=$(echo "$URLS" | sha256sum | cut -c1-16)
              echo "URL_FINGERPRINT=${FP}" >> "$GITHUB_ENV"
              echo "$URLS" | while read -r path; do
                [ -n "$path" ] || continue
                [[ "$path" =~ ^https?:// ]] || path="http://www.plovput.rs${path}"
                curl -fL --retry 3 "$path" -o /tmp/ienc-part.zip
                unzip -qo /tmp/ienc-part.zip -d /tmp/ienc-enc && rm /tmp/ienc-part.zip
              done
              ;;

            PL)
              URLS=$(curl -fsL --max-time 30 "https://www.szczecin.uzs.gov.pl/?page_id=6092" \
                | grep -oE 'href="[^"]*IENC[^"]*\.zip"' | grep -oE '"[^"]*"' | tr -d '"' | sort -u || true)
              FP=$(echo "$URLS" | sha256sum | cut -c1-16)
              echo "URL_FINGERPRINT=${FP}" >> "$GITHUB_ENV"
              echo "$URLS" | while read -r url; do
                [ -n "$url" ] || continue
                [[ "$url" =~ ^https?:// ]] || url="https://www.szczecin.uzs.gov.pl${url}"
                curl -fL --retry 3 "$url" -o /tmp/ienc-part.zip
                unzip -qo /tmp/ienc-part.zip -d /tmp/ienc-enc && rm /tmp/ienc-part.zip
              done
              ;;

            CH)
              URL=$(curl -fsL --max-time 30 \
                "https://port-of-switzerland.ch/hafenservice/schifffahrtsservice/inland-enc-hochrhein/" \
                | grep -oE 'href="[^"]*(Hochrhein|INLAND)[^"]*\.zip"' | grep -oE '"[^"]*"' | tr -d '"' | head -1 || true)
              [[ "$URL" =~ ^https?:// ]] || URL="https://port-of-switzerland.ch${URL}"
              FP=$(echo "$URL" | sha256sum | cut -c1-16)
              echo "URL_FINGERPRINT=${FP}" >> "$GITHUB_ENV"
              curl -fL --retry 3 "$URL" -o /tmp/ienc-part.zip
              unzip -qo /tmp/ienc-part.zip -d /tmp/ienc-enc && rm /tmp/ienc-part.zip
              ;;

          esac

          ENC_COUNT=$(find /tmp/ienc-enc -name "*.000" ! -name "._*" -type f | wc -l)
          echo "Found ${ENC_COUNT} ENC cells"
          if [ "$ENC_COUNT" -eq 0 ]; then
            echo "ERROR: no .000 files found after extraction"
            exit 1
          fi

      - name: Convert with enc-converter
        run: |
          COUNTRY_LOWER=$(echo "${{ matrix.country }}" | tr '[:upper:]' '[:lower:]')
          docker run --rm --user "$(id -u):$(id -g)" \
            -v /tmp/ienc-enc:/data/enc:ro \
            -v /tmp/enc-output:/data/output \
            ghcr.io/${{ github.repository_owner }}/enc-converter:latest \
            /data/enc /data/output "eu-ienc-${COUNTRY_LOWER}"

      - name: Write result JSON
        if: always()
        run: |
          COUNTRY="${{ matrix.country }}"
          COUNTRY_LOWER=$(echo "$COUNTRY" | tr '[:upper:]' '[:lower:]')
          OUT="/tmp/enc-output/eu-ienc-${COUNTRY_LOWER}.mbtiles"
          RESULT="/tmp/enc-output/ienc-result-${COUNTRY}.json"
          mkdir -p /tmp/enc-output
          if [ -f "$OUT" ]; then
            SIZE=$(stat -c%s "$OUT")
            printf '{"country":"%s","urlFingerprint":"%s","lastModified":"%s","lastConverted":"%s","success":true,"sizeBytes":%s}\n' \
              "$COUNTRY" "${URL_FINGERPRINT:-}" "${LAST_MODIFIED:-}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIZE" > "$RESULT"
          else
            printf '{"country":"%s","success":false}\n' "$COUNTRY" > "$RESULT"
          fi

      - name: Upload MBTiles artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ienc-mbtiles-${{ matrix.country }}
          path: /tmp/enc-output/eu-ienc-*.mbtiles
          retention-days: 1

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ienc-result-${{ matrix.country }}
          path: /tmp/enc-output/ienc-result-${{ matrix.country }}.json
          retention-days: 1

  # ── Job 3: Publish release assets and commit updated state.json ────────
  publish:
    name: Publish release assets
    needs: [check-updates, convert]
    if: >
      always() &&
      needs.check-updates.outputs.has_updates == 'true' &&
      needs.convert.result != 'cancelled'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download MBTiles artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ienc-mbtiles-*
          path: /tmp/mbtiles
          merge-multiple: true

      - name: Download result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ienc-result-*
          path: /tmp/results
          merge-multiple: true

      - name: Update state.json
        run: |
          for f in /tmp/results/ienc-result-*.json; do
            [ -f "$f" ] || continue
            python3 - "$f" <<'PY'
          import json, sys
          result = json.load(open(sys.argv[1]))
          if not result.get('success'):
              print(f"  {result.get('country','?')}: failed — state unchanged")
              sys.exit(0)
          state = json.load(open('state.json'))
          c = result['country']
          if result.get('urlFingerprint'):
              state['ienc'][c]['urlFingerprint'] = result['urlFingerprint']
          if result.get('lastModified'):
              state['ienc'][c]['lastModified'] = result['lastModified']
          state['ienc'][c]['lastConverted'] = result.get('lastConverted')
          json.dump(state, open('state.json', 'w'), indent=2)
          open('state.json', 'a').write('\n')
          print(f"  {c}: updated")
          PY
          done

      - name: Move ienc-latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ienc-latest
          git push origin refs/tags/ienc-latest --force

      - name: Create or update ienc-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          NOTES="European Inland ENC charts (IENC / S-57) converted to MBTiles by country. Updated weekly.

          | File | Coverage |
          |---|---|
          | eu-ienc-at.mbtiles | Austria — Danube (DORIS/Viadonau) |
          | eu-ienc-hr.mbtiles | Croatia — Danube, Sava, Drava |
          | eu-ienc-rs.mbtiles | Serbia — Danube, Sava, Tisa |
          | eu-ienc-pl.mbtiles | Poland — Oder system (UZS Szczecin) |
          | eu-ienc-ch.mbtiles | Switzerland — High Rhine |

          Tile zoom range: z9–z18. Format: vector tiles (MVT / pbf).
          See \`state.json\` in this repo for per-country conversion dates."

          if gh release view ienc-latest &>/dev/null; then
            gh release edit ienc-latest \
              --title "European IENC MBTiles ${DATE}" \
              --notes "$NOTES"
          else
            gh release create ienc-latest \
              --title "European IENC MBTiles ${DATE}" \
              --notes "$NOTES" \
              --latest=false
          fi

      - name: Upload MBTiles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in /tmp/mbtiles/eu-ienc-*.mbtiles; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") ($(du -sh "$f" | cut -f1))"
            gh release upload ienc-latest "$f" --clobber
          done

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json unchanged (all converted countries failed)"
          else
            git commit -m "chore: update state.json after IENC conversion [skip ci]"
            git push
          fi
